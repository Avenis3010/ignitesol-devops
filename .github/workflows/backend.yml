name: Backend Deploy

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: backend-api
  ACCOUNT_ID: 758024567313

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      role-to-assume: IAM_ROLE_ARN
      aws-region: ap-south-1

  - name: Login to ECR
    uses: aws-actions/amazon-ecr-login@v2

  - name: Build Docker Image
    run: |
      docker build -t backend-api ./services/backend-api

  - name: Tag Docker Image
    run: |
      docker tag backend-api:latest \
      $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}

  - name: Push Docker Image
    run: |
      docker push \
      $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}


